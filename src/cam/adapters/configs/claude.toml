# Claude Code adapter — interactive mode with --allowed-tools.
#
# Runs in interactive mode (not headless -p) with pre-authorized tools.
# Permission prompts use numbered menus:
#   "1. Yes  2. Yes, don't ask again  3. No" — send "1" without Enter.
# Trust dialogs (v2.1+) use Ink select menus:
#   "Enter to confirm · Esc to cancel" — just press Enter.
#
# TUI markers:
#   Ready prompt:     ❯ (start of line)
#   Tool call:        ● Read(...), ● Bash(...)
#   Task summary:     ✻ Crunched for 1m 11s
#   Completion:       Two ❯ lines = task done (prompt echo + return to input)

[adapter]
name = "claude"
display_name = "Claude Code"

[launch]
# Use POSIX `env KEY=VAL prog…` prefix to set CLAUDE_CODE_DISABLE_MOUSE
# in the agent's environment. tmux execs argv directly without a shell,
# so this works identically under bash / zsh / csh / tcsh / fish / dash
# login shells — /usr/bin/env is the single source of truth.
command = ["env", "CLAUDE_CODE_DISABLE_MOUSE=1", "claude", "--allowed-tools", "Bash,Edit,Read,Write,Glob,Grep,WebFetch,TodoWrite,NotebookEdit"]
auto_permission_mode = true     # add --permission-mode auto to launch command (default on as of 2026-06-11)
prompt_after_launch = true
startup_wait = 30.0
strip_ansi = true

ready_pattern = "^[❯>]"
ready_flags = ["MULTILINE"]

[state]
strategy = "last"
recent_chars = 2000

[[state.patterns]]
state = "planning"
pattern = "(● Read\\(|● Glob\\(|● Grep\\(|● WebFetch\\(|● WebSearch\\(|Thinking|Analyzing)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "editing"
pattern = "(● Edit\\(|● Write\\(|● NotebookEdit\\()"

[[state.patterns]]
state = "testing"
pattern = "(● Bash\\(|Running tests|pytest|npm test|npm run)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "committing"
pattern = "(git commit|git push|gh pr create)"
flags = ["IGNORECASE"]

[completion]
strategy = "prompt_count"

prompt_pattern = "^[❯>]"
prompt_flags = ["MULTILINE"]
prompt_count_threshold = 2

# Fallback: single ❯ plus task summary (✻ verb for time) = completion
# Claude rotates verbs (Crunched, Sautéed, Whisked, Baked, etc.)
fallback_summary_pattern = "✻ .+ for \\d+"

# (2026-06-11 trim) Rules removed: "Do you want to proceed",
# "Allow once/always", and the v2.1 trust-dialog Enter rule. All three
# false-fired on scrollback prose, and the trust-dialog one fired on
# this very documentation block. The single remaining numbered-menu
# rule below requires the active cursor ❯ at line start, so it can ONLY
# match when Claude has actually drawn the menu.
[[confirm]]
# Numbered permission menu — "❯ 1. Yes" / "❯ 1. Allow". The cursor ❯
# is what Ink draws when the menu is active and highlighting option 1.
# Anchor: literal ❯ followed by whitespace then "1." then Yes/Allow.
pattern = "^❯\\s+1\\.\\s*(Yes|Allow).*$"
flags = ["IGNORECASE", "MULTILINE"]
response = "1"
send_enter = false

# (2026-06-11 hot-fix) The generic y/n bracket rule
#   "\(y/n\)|\[Y/n\]|\[y/N\]"
# was REMOVED — modern Claude Code does not use bracket-y/n prompts,
# it uses the numbered menus handled by the rules above. The legacy
# rule false-fired on markdown discussions / scrollback prose
# containing the literal bracket token. Also, src/camc_pkg/detection.py
# now requires an input cursor (❯) to be visible before ANY rule may
# fire — a second layer that protects the remaining rules.

[[confirm]]
# Multi-line paste confirmation: [Pasted text #1 +N lines]
pattern = "Pasted text.*\\+\\d+ lines"
response = ""
send_enter = true

[monitor]
# Screen-bottom signals for definitive state detection (no other checks needed).
# busy_pattern: agent is actively working (e.g. "Creating…", "Smooshing…")
# Match: verb + 3 dots or Unicode ellipsis, at the start of a line (col 0).
# The "3 dots or …" excludes URLs/filenames (promptengineering.org, testing.py).
# The line-start anchor excludes indented sub-agent output and embedded prose.
busy_pattern = "(?:^|\\n)\\S.*ing(?:…|\\.{3})"
# done_pattern: task just finished (e.g. "Crunched for 36s", "Cogitated for 1m 8s")
done_pattern = "ed\\s+for\\s+\\d+[smh]"
confirm_cooldown = 5.0        # seconds between auto-confirm attempts
confirm_recent_lines = 20
confirm_sleep = 0.5           # sleep after sending confirmation
health_check_interval = 15    # seconds between tmux alive checks
idle_stable_seconds = 60      # normalized-content hash0 stable this long -> idle
auto_exit = false             # finalize agent when task completes and idle confirmed
exit_action = "kill_session"  # "kill_session", "send_exit", or "mark_only"
exit_command = "/exit"        # command to send if exit_action = "send_exit"

# Adapter-owned readiness (F-08). Tool-specific auth/version policy
# lives here so each tool owns its rules in TOML instead of being
# hardcoded in runtime_env._TOOL_SPECS. The launch command above uses
# `env CLAUDE_CODE_DISABLE_MOUSE=1 claude ...` for shell-agnostic env
# injection; readiness.binary disambiguates so the check resolves
# `claude` itself, not /usr/bin/env.
[readiness]
binary = "claude"
version_args = ["--version"]
version_required = true
install_hint = "npm install -g @anthropic-ai/claude-code"

[[readiness.required_files]]
path = "~/.claude.json"
label = "Claude auth file"
