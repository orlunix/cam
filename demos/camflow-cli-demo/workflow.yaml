# cam-flow CLI demo ‚Äî workflow with loops + lessons
#
# Flow graph:
#   start ‚Üí fix ‚Üí test ‚îÄ‚îÄsuccess‚îÄ‚îÄ‚Üí done
#                  ‚Üë      fail
#                  ‚îî‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ fix ‚Üê‚îÄ‚îÄ‚îÄ‚îò
#
# The test‚Üífix‚Üítest loop repeats until all tests pass or max iterations.
# Lessons accumulate in state.lessons and are persisted to CLAUDE.md on completion.

start:
  do: agent claude
  with: |
    Run the tests to see what's broken:
      pytest test_calculator.py -v
    Analyze all failures. Identify root causes in calculator.py.
    Put a summary of ALL failing tests and their causes into state_updates.error.

    Check state.lessons for any lessons from previous runs ‚Äî they may help.
    Previous lessons: {{state.lessons}}

    Do NOT fix anything yet ‚Äî just analyze.
  next: fix

fix:
  do: agent claude
  with: |
    Fix EXACTLY ONE bug in calculator.py ‚Äî pick the most critical unfixed one.
    Do NOT fix multiple bugs in a single pass. One bug, one fix, then stop.
    Error info from analysis: {{state.error}}

    Check previous lessons before fixing ‚Äî avoid repeating past mistakes:
    {{state.lessons}}

    Rules:
    - Only modify calculator.py, never modify test_calculator.py
    - Fix ONE bug only ‚Äî leave the rest for the next iteration
    - Make a minimal, targeted fix for that single bug

    If you learn something non-obvious during the fix (a gotcha, an edge case,
    a pattern that wasn't obvious from the code), add it to state_updates.new_lesson
    as a one-line string. Only add genuinely useful insights, not routine fixes.
  next: test

test:
  do: cmd pytest test_calculator.py -v
  transitions:
    - if: fail
      goto: fix
    - if: success
      goto: done

done:
  do: agent claude
  with: |
    All tests pass. Give a brief summary of what was fixed.
