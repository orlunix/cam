# Codex adapter — interactive mode (no --full-auto, blocked by OpenAI cloud).
# Auto-confirm handles the initial trust dialog and approval prompts.
#
# TUI markers:
#   Input prompt:  › (start of line)
#   Working:       • Thinking / Exploring / etc.
#   Completion:    Two › lines = task done (echoed prompt + return to idle)

[adapter]
name = "codex"
display_name = "OpenAI Codex"

[launch]
command = ["codex", "{prompt}"]
prompt_after_launch = false
startup_wait = 0.0

[state]
strategy = "first"
recent_chars = 2000

[[state.patterns]]
state = "planning"
pattern = "(Thinking|Planning|Analyzing|Reading|Searching|Reviewing)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "editing"
pattern = "(Editing|Writing|Creating|Modifying|Applying|Patching)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "testing"
pattern = "(Running|Testing|Executing|Verifying|npm test|pytest|cargo test)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "committing"
pattern = "(Committing|Pushing|git commit|git push|Creating PR)"
flags = ["IGNORECASE"]

[completion]
strategy = "prompt_count"

prompt_pattern = "^›"
prompt_flags = ["MULTILINE"]
prompt_count_threshold = 2

error_pattern = "(Error:|error:|FAILED|fatal:|Exception|command not found)"
error_flags = ["IGNORECASE"]

[[confirm]]
# Trust dialog: "1. Yes, allow Codex to work in this folder"
pattern = "1\\.\\s*(Yes,?\\s*)?allow Codex to work"
flags = ["IGNORECASE"]
response = "1"
send_enter = true

[[confirm]]
pattern = "(Apply|Accept|Approve|Continue|Proceed).*\\[Y/n\\]"
flags = ["IGNORECASE"]
response = "y"
send_enter = true

[[confirm]]
pattern = "(Apply|Accept|Approve|Continue|Proceed).*\\[y/N\\]"
flags = ["IGNORECASE"]
response = "y"
send_enter = true

[[confirm]]
pattern = "Press Enter"
flags = ["IGNORECASE"]
response = ""
send_enter = true
