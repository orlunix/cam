# Codex adapter — interactive mode.
# Auto-confirm handles the initial trust dialog and approval prompts.
#
# TUI markers:
#   Input prompt:  › (start of line)
#   Working:       • Thinking / Exploring / etc.
#   Completion:    Two › lines = task done (echoed prompt + return to idle)

[adapter]
name = "codex"
display_name = "OpenAI Codex"

[launch]
command = ["codex", "-c", "features.goals=true"]
prompt_after_launch = true
startup_wait = 20.0
# 2026-06-23 PDX hotfix: include U+276F ❯ in addition to U+203A ›
# and ASCII '>'. Some Codex builds render the input prompt with ❯,
# others with ›. Accept all three so the launch loop sees readiness
# regardless of the build variant. The character class is anchored
# at line start so unrelated prose can't false-trigger.
ready_pattern = "^[❯›>]"
ready_flags = ["MULTILINE"]
prompt_submit_delay = 0.5

[state]
strategy = "first"
recent_chars = 2000

[[state.patterns]]
state = "planning"
pattern = "(Thinking|Planning|Analyzing|Reading|Searching|Reviewing)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "editing"
pattern = "(Editing|Writing|Creating|Modifying|Applying|Patching)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "testing"
pattern = "(Running|Testing|Executing|Verifying|npm test|pytest|cargo test)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "committing"
pattern = "(Committing|Pushing|git commit|git push|Creating PR)"
flags = ["IGNORECASE"]

[completion]
strategy = "prompt_count"

prompt_pattern = "^›"
prompt_flags = ["MULTILINE"]
prompt_count_threshold = 2

error_pattern = "(Error:|error:|FAILED|fatal:|Exception|command not found)"
error_flags = ["IGNORECASE"]

# (2026-06-11 trim) Rules 2, 3, 4 removed (trust-dialog DOTALL variants,
# bottom-menu variant, sandbox-retry). They each used broad anchors that
# false-fired on scrollback prose. The single rule below requires the
# active cursor › at line start — only matches when the menu is drawn.
[[confirm]]
# Numbered menu — cursor at line start, then "1. Yes".
pattern = "^›\\s+1\\.\\s*Yes.*$"
flags = ["IGNORECASE", "MULTILINE"]
response = "1"
send_enter = false

# (2026-06-11 hot-fix) The generic bracket-y/n rule
#   "\[Y/n\]|\[y/N\]"
# was REMOVED — modern codex uses numbered menus handled by the
# rules above. The legacy rule false-fired on prose / scrollback
# containing the literal bracket token. The new global input-cursor
# guard in src/camc_pkg/detection.py is a second layer of defense.

[monitor]
# Codex shows "• Working (7s • esc to interrupt)" while busy
busy_pattern = "Working \\(\\d+s"
confirm_cooldown = 5.0
confirm_recent_lines = 20
confirm_sleep = 0.5
health_check_interval = 15
idle_stable_seconds = 60      # normalized-content hash0 stable this long -> idle
auto_exit = false             # finalize agent when task completes and idle confirmed
exit_action = "kill_session"  # "kill_session", "send_exit", or "mark_only"
exit_command = "/exit"        # command to send if exit_action = "send_exit"

# Adapter-owned readiness (F-08). Codex auth is soft: any one of the
# alternatives below passes; complete miss is a WARN not a block,
# because the canonical auth path varies across deployments.
[readiness]
binary = "codex"
version_args = ["--version"]
version_required = true
install_hint = "npm install -g @openai/codex"

[[readiness.optional_files]]
path = "~/.codex/auth.json"

[[readiness.optional_files]]
path = "~/.codex/config.toml"

[[readiness.optional_env]]
name = "OPENAI_API_KEY"
