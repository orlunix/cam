# Cursor Agent adapter — interactive mode (like Claude adapter).
#
# Uses interactive TUI (not -p headless) because:
# - headless `-p` mode rejects shell commands when --force/--yolo is disabled by admin
# - interactive mode allows auto-confirming permission prompts via CAM monitor
#
# TUI markers observed:
#   Ready prompt:     → Plan, search, build anything
#   Tool call:        ⬢ Read /path   ⬢ Edit /path
#   Shell command:    $ python3 test.py <time> in /dir
#   Permission:       Run this command? → Run (once) (y)
#   Completion:       → Add a follow-up  (second → prompt = done)

[adapter]
name = "cursor"
display_name = "Cursor Agent"

[launch]
command = ["agent", "--workspace", "{path}"]
prompt_after_launch = true
startup_wait = 15.0
strip_ansi = true

ready_pattern = "→"
ready_flags = ["MULTILINE"]

[state]
strategy = "last"
recent_chars = 2000

[[state.patterns]]
state = "planning"
pattern = "(⬢ Read|⬢ Glob|⬢ Grep|Thinking|Analyzing)"

[[state.patterns]]
state = "editing"
pattern = "(⬢ Edit|⬢ Write)"

[[state.patterns]]
state = "testing"
pattern = "(\\$ .+in /|Running tests|pytest|npm test)"
flags = ["IGNORECASE"]

[[state.patterns]]
state = "committing"
pattern = "(git commit|git push|gh pr create)"
flags = ["IGNORECASE"]

[completion]
strategy = "prompt_count"

prompt_pattern = "→"
prompt_flags = ["MULTILINE"]
prompt_count_threshold = 2

# Fallback: single → plus usage percentage = completion
# Agent shows "Claude 4.6 Opus (Thinking) · 6.7%" after task finishes
fallback_summary_pattern = "·\\s*\\d+(\\.\\d+)?%"

# (2026-06-11 trim) All prior rules removed; replaced by two anchored
# rules below. The active cursor marker for Cursor TUI is →.

[[confirm]]
# Generic (y) prompt — anchored to the line start with the → cursor
# marker (Proceed (y) / Run once (y) / ...).
pattern = "^\\s*→.*\\(y\\)"
flags = ["MULTILINE"]
response = "y"
send_enter = false

[monitor]
# Cursor shows "Thinking..." while busy, "· X.Y%" usage after done.
# Line-start anchor + 3-dot/ellipsis requirement avoids URL / filename
# false positives (e.g. "promptengineering.org", "testing.py").
busy_pattern = "(?:^|\\n)\\S.*ing(?:…|\\.{3})"
confirm_cooldown = 5.0
confirm_recent_lines = 20
confirm_sleep = 0.5
health_check_interval = 15
idle_stable_seconds = 60      # normalized-content hash0 stable this long -> idle
auto_exit = false             # finalize agent when task completes and idle confirmed
exit_action = "kill_session"  # "kill_session", "send_exit", or "mark_only"
exit_command = "/exit"        # command to send if exit_action = "send_exit"

# Adapter-owned readiness (F-08). Cursor: binary + version only —
# no required auth files in current code.
[readiness]
binary = "cursor"
version_args = ["--version"]
version_required = true
install_hint = "ensure 'cursor' is in PATH"
