name: Cam Desktop — Windows MSI

# Single-installer Windows release for Cam Desktop.
# Produces exactly one .msi artifact, mirroring the ChatShell build-windows
# job pattern: tauri build --target x86_64-pc-windows-msvc --bundles msi.

on:
  push:
    tags:
      - 'cam-desktop-v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/cam-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/cam-desktop/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/cam-desktop/src-tauri -> target

      - name: Build single MSI installer
        run: npm run build:windows-msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cam-desktop-windows-msi
          path: apps/cam-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
