<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CamUI V2</title>
  <meta name="cam-version" content="v2.2.0">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css?v=2.2.0">
  <link rel="stylesheet" href="css/mobile.css?v=2.2.0">
  <link rel="modulepreload" href="js/api.js?v=2.2.0">
  <link rel="modulepreload" href="js/state.js?v=2.2.0">
  <link rel="modulepreload" href="js/mobile/app.js?v=2.2.0">
</head>
<body class="camui-v2">
  <div id="app">
    <header id="header">
      <div class="header-left">
        <button class="header-menu-btn" id="header-menu-btn"
          onclick="document.getElementById('header-menu').classList.toggle('hidden')">&#9776;</button>
        <nav class="header-menu hidden" id="header-menu">
          <a href="#/" class="header-menu-item nav-item" data-route="/">
            <span class="hm-icon">&#9632;</span> Agents
          </a>
          <a href="#/start" class="header-menu-item nav-item" data-route="/start">
            <span class="hm-icon">+</span> New Agent
          </a>
          <a href="#/machines" class="header-menu-item nav-item" data-route="/machines">
            <span class="hm-icon">&#9635;</span> Nodes
          </a>
          <a href="#/skills" class="header-menu-item nav-item" data-route="/skills">
            <span class="hm-icon">&#9733;</span> Skills
          </a>
          <a href="#/settings" class="header-menu-item nav-item" data-route="/settings">
            <span class="hm-icon">&#9881;</span> Settings
          </a>
          <hr style="border:0;border-top:1px solid #333;margin:4px 0;">
          <a href="javascript:void(0)" class="header-menu-item" id="reload-app">
            <span class="hm-icon">&#8635;</span> Reload
          </a>
        </nav>
        <span class="logo">CamUI <span class="v2-badge">V2</span></span>
      </div>
      <div class="header-right">
        <span id="conn-label" style="font-size:11px;color:#888"></span>
        <span id="conn-status" class="conn-dot disconnected"></span>
      </div>
    </header>
    <main id="content">
      <div id="loading-indicator" style="display:flex;align-items:center;justify-content:center;height:60vh;color:#888;font-size:14px">
        <span>Connecting...</span>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener('click', function(e) {
      var menu = document.getElementById('header-menu');
      var btn = document.getElementById('header-menu-btn');
      if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.add('hidden');
      }
    });
    document.getElementById('reload-app').addEventListener('click', function() {
      try { localStorage.setItem('cam_reload_route', location.hash || '#/'); } catch {}
      if (window.CamBridge && window.CamBridge.restartApp) {
        window.CamBridge.restartApp(location.hash || '#/');
      } else {
        location.reload();
      }
    });
  </script>
  <script type="module" src="js/mobile/app.js?v=2.2.0"></script>
</body>
</html>
